name: Build Windows App (Manual)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install tomli

    - name: Prepare Internal Binaries (FFmpeg & yt-dlp)
      run: |
        # Create directory
        New-Item -ItemType Directory -Force -Path "src/ytdlpgui/_internal"

        # 1. Download FFmpeg
        Write-Host "Downloading FFmpeg..."
        Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile "ffmpeg.zip"
        Expand-Archive -Path "ffmpeg.zip" -DestinationPath "ffmpeg_temp"
        Get-ChildItem -Path "ffmpeg_temp" -Filter "ffmpeg.exe" -Recurse | Copy-Item -Destination "src/ytdlpgui/_internal"
        Get-ChildItem -Path "ffmpeg_temp" -Filter "ffprobe.exe" -Recurse | Copy-Item -Destination "src/ytdlpgui/_internal"
        
        # 2. Download yt-dlp.exe (Latest Release)
        Write-Host "Downloading yt-dlp.exe..."
        Invoke-WebRequest -Uri "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" -OutFile "src/ytdlpgui/_internal/yt-dlp.exe"
        
        # Cleanup
        Remove-Item -Path "ffmpeg.zip"
        Remove-Item -Path "ffmpeg_temp" -Recurse -Force

    - name: Build with Flet
      env:
        PYTHONIOENCODING: utf-8
      run: |
        flet build windows --yes --no-rich-output --project VeloGet --product VeloGet --org com.lucifer --copyright "Copyright (c) 2026 Lucifer" --exclude venv-new venv-final build dist .git .github
      
    - name: Get Version
      id: get_version
      shell: python
      run: |
        import tomli
        import os
        with open("pyproject.toml", "rb") as f:
            version = tomli.load(f)["project"]["version"]
        with open(os.environ["GITHUB_OUTPUT"], "a") as f:
            f.write(f"version={version}\n")

    - name: Archive Release
      run: |
        $Version = "${{ steps.get_version.outputs.version }}"
        $ZipName = "VeloGet-Windows-$Version.zip"
        # Ensure dist directory exists
        New-Item -ItemType Directory -Force -Path "dist"
        Compress-Archive -Path "build/windows/*" -DestinationPath "dist/$ZipName"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: VeloGet-Windows
        path: dist/*.zip
