name: Build Windows MSI

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install briefcase toga yt-dlp

    - name: Download FFmpeg for Windows
      run: |
        # Download FFmpeg
        Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile "ffmpeg.zip"
        # Extract
        Expand-Archive -Path "ffmpeg.zip" -DestinationPath "ffmpeg_temp"
        # Create destination dir
        New-Item -ItemType Directory -Force -Path "src/ytdlpgui/_internal"
        # Move executables (Find them recursively as the zip structure varies slightly by version)
        Get-ChildItem -Path "ffmpeg_temp" -Filter "ffmpeg.exe" -Recurse | Copy-Item -Destination "src/ytdlpgui/_internal"
        Get-ChildItem -Path "ffmpeg_temp" -Filter "ffprobe.exe" -Recurse | Copy-Item -Destination "src/ytdlpgui/_internal"
        # Cleanup
        Remove-Item -Path "ffmpeg.zip"
        Remove-Item -Path "ffmpeg_temp" -Recurse -Force

    - name: Build and Package
      run: |
        briefcase build windows
        briefcase package windows --adhoc-sign

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: VeloGet-Windows-Installer
        path: dist/*.msi
