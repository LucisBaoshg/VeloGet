name: Build And Publish Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  FLET_CLI_NO_RICH_OUTPUT: 1
  PYTHONUTF8: 1

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm64
            os: macos-14
            arch: arm64
            build_command: ./build_release.sh
          - name: macos-x64
            os: macos-15-intel
            arch: x64
            build_command: ./build_release.sh
          - name: windows-x64
            os: windows-latest
            arch: x64
            build_command: .\build_release_win.ps1

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Compute release metadata
        id: release_meta
        shell: bash
        run: |
          VERSION=$(python - <<'PY'
          import tomllib
          with open("pyproject.toml", "rb") as handle:
              print(tomllib.load(handle)["project"]["version"])
          PY
          )
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "arch=${{ matrix.arch }}" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install tomli

      - name: Validate tag version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PYPROJECT_VERSION=$(python - <<'PY'
          import tomllib
          with open("pyproject.toml", "rb") as handle:
              print(tomllib.load(handle)["project"]["version"])
          PY
          )
          if [ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "Tag version $TAG_VERSION does not match pyproject version $PYPROJECT_VERSION"
            exit 1
          fi

      - name: Prepare Windows internal binaries
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "src/ytdlpgui/_internal" | Out-Null
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile "ffmpeg.zip"
          Expand-Archive -Path "ffmpeg.zip" -DestinationPath "ffmpeg_temp"
          Get-ChildItem -Path "ffmpeg_temp" -Filter "ffmpeg.exe" -Recurse | Copy-Item -Destination "src/ytdlpgui/_internal"
          Get-ChildItem -Path "ffmpeg_temp" -Filter "ffprobe.exe" -Recurse | Copy-Item -Destination "src/ytdlpgui/_internal"
          Invoke-WebRequest -Uri "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" -OutFile "src/ytdlpgui/_internal/yt-dlp.exe"
          Remove-Item -Path "ffmpeg.zip" -Force
          Remove-Item -Path "ffmpeg_temp" -Recurse -Force

      - name: Detect Apple signing configuration
        if: runner.os == 'macOS'
        id: apple_signing
        shell: bash
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          if [ -n "${APPLE_CERTIFICATE_P12:-}" ] \
            && [ -n "${APPLE_CERTIFICATE_PASSWORD:-}" ] \
            && [ -n "${APPLE_SIGNING_IDENTITY:-}" ] \
            && [ -n "${APPLE_TEAM_ID:-}" ] \
            && [ -n "${APPLE_ID:-}" ] \
            && [ -n "${APPLE_APP_SPECIFIC_PASSWORD:-}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "APPLE_SIGNING_ENABLED=true" >> "$GITHUB_ENV"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "APPLE_SIGNING_ENABLED=false" >> "$GITHUB_ENV"
            echo "Apple signing secrets are incomplete; macOS artifacts will be built unsigned."
          fi

      - name: Import Apple signing certificate
        if: runner.os == 'macOS' && steps.apple_signing.outputs.enabled == 'true'
        shell: bash
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/apple-signing-cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          echo -n "$APPLE_CERTIFICATE_P12" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          echo "APPLE_KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "APPLE_KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"

      - name: Build release assets
        if: runner.os != 'Windows'
        shell: bash
        run: ${{ matrix.build_command }}

      - name: Build release assets
        if: runner.os == 'Windows'
        shell: pwsh
        run: ${{ matrix.build_command }}

      - name: Sign, notarize and repackage macOS assets
        if: runner.os == 'macOS' && steps.apple_signing.outputs.enabled == 'true'
        shell: bash
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          VERSION: ${{ steps.release_meta.outputs.version }}
          ARCH: ${{ steps.release_meta.outputs.arch }}
        run: |
          APP_PATH="build/macos/VeloGet.app"
          if [ ! -d "$APP_PATH" ]; then
            ALT_APP_PATH=$(find "build/macos" -maxdepth 3 -type d -name "VeloGet.app" -print -quit || true)
            if [ -n "${ALT_APP_PATH:-}" ]; then
              APP_PATH="$ALT_APP_PATH"
              echo "Resolved app bundle path dynamically: $APP_PATH"
            else
              echo "Error: App bundle not found at build/macos/VeloGet.app"
              find "build/macos" -maxdepth 3 -print || true
              exit 1
            fi
          fi
          APP_PARENT_DIR="$(dirname "$APP_PATH")"
          DMG_PATH="dist/veloget-${VERSION}-macos-${ARCH}.dmg"
          APP_ZIP_PATH="dist/veloget-${VERSION}-macos-${ARCH}.app.zip"
          APP_UPDATE_PATH="dist/veloget-${VERSION}-macos-${ARCH}.app.tar.gz"

          # Some bundled Python wheels/frameworks include symlinks that are
          # harmless at runtime but rejected by codesign bundle validation.
          # Clean any broken or bundle-external symlinks before signing.
          find "$APP_PATH" -type l | while read -r link_path; do
            link_target="$(readlink "$link_path")"
            resolved_target="$(python -c 'from pathlib import Path; import sys; link_path = Path(sys.argv[1]); link_target = sys.argv[2]; candidate = Path(link_target); candidate = candidate if candidate.is_absolute() else (link_path.parent / candidate).resolve(strict=False); print(candidate)' "$link_path" "$link_target")"
            if [ ! -e "$resolved_target" ]; then
              echo "Removing invalid symlink: $link_path -> $link_target"
              rm -f "$link_path"
              continue
            fi
            case "$resolved_target" in
              "$PWD"/*) ;;
              *)
                echo "Removing external symlink: $link_path -> $link_target"
                rm -f "$link_path"
                ;;
            esac
          done

          codesign --force --deep --options runtime --timestamp --sign "$APPLE_SIGNING_IDENTITY" "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

          rm -f "$APP_ZIP_PATH"
          ditto -c -k --keepParent "$APP_PATH" "$APP_ZIP_PATH"

          xcrun notarytool submit "$APP_ZIP_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$APP_PATH"

          rm -f "$DMG_PATH" "$APP_ZIP_PATH" "$APP_UPDATE_PATH"
          DMG_TMP="$(mktemp -d)"
          rsync -a "$APP_PATH" "$DMG_TMP/"
          ln -s /Applications "$DMG_TMP/Applications"
          hdiutil create \
            -volname "VeloGet Installer" \
            -srcfolder "$DMG_TMP" \
            -ov -format UDZO \
            "$DMG_PATH"
          rm -rf "$DMG_TMP"

          tar -C "$APP_PARENT_DIR" -czf "$APP_UPDATE_PATH" "VeloGet.app"

          codesign --force --timestamp --sign "$APPLE_SIGNING_IDENTITY" "$DMG_PATH"
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$DMG_PATH"

      - name: Clean up temporary keychain
        if: always() && runner.os == 'macOS' && steps.apple_signing.outputs.enabled == 'true'
        shell: bash
        run: |
          if [ -n "${APPLE_KEYCHAIN_PATH:-}" ] && [ -f "${APPLE_KEYCHAIN_PATH}" ]; then
            security delete-keychain "${APPLE_KEYCHAIN_PATH}" || true
          fi

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/*

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
